<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Jim.my</title>
    <script>
      // Encode the current path into the query string and redirect to the root.
      // segmentCount = 1 because the base is /personal-website (one segment).
      var segmentCount = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
